name: Security Checks

on:
pull_request:
push:
branches:
- main
- develop

jobs:
security-scan:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Setup Node
    uses: actions/setup-node@v4
    with:
      node-version: 20

  - name: Install Dependencies
    run: npm ci

  - name: Check for Hardcoded Secrets
    run: |
      if grep -R -E "(password\s*=|api[_-]?key|secret|token)" . \
      --exclude-dir=node_modules \
      --exclude=package-lock.json; then
        echo "Potential secret detected"
        exit 1
      fi

  - name: Check for Hardcoded Waits
    run: |
      if grep -R "waitForTimeout(" tests pages; then
        echo "waitForTimeout detected"
        exit 1
      fi

  - name: Check Playwright Configuration Exists
    run: |
      test -f playwright.config.js

  - name: Run Playwright Tests
    run: |
      npx playwright test
```
